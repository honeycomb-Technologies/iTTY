name: Daemon Build & Test

on:
  push:
    paths:
      - 'daemon/**'
      - 'install/**'
      - 'docs/daemon/**'
      - 'docs/features/tailscale.md'
      - '.github/workflows/daemon-build.yml'
      - '.github/workflows/daemon-release.yml'
  pull_request:
    paths:
      - 'daemon/**'
      - 'install/**'
      - 'docs/daemon/**'
      - 'docs/features/tailscale.md'
      - '.github/workflows/daemon-release.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        working-directory: daemon
        run: make build

      - name: Test
        working-directory: daemon
        run: make test

      - name: Lint
        working-directory: daemon
        run: make lint

      - name: Check installer syntax
        run: bash -n install/install.sh

      - name: Check launchd plist template XML
        run: python3 -c 'import xml.etree.ElementTree as ET; ET.parse("install/com.honeycomb.itty.plist")'

  cross-compile:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cross-compile all platforms
        working-directory: daemon
        run: make cross
