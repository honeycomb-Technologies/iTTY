name: Daemon Build & Test

on:
  push:
    paths:
      - 'daemon/**'
      - '.github/workflows/daemon-build.yml'
  pull_request:
    paths:
      - 'daemon/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        working-directory: daemon
        run: make build

      - name: Test
        working-directory: daemon
        run: make test

      - name: Lint
        working-directory: daemon
        run: make lint

  cross-compile:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cross-compile all platforms
        working-directory: daemon
        run: make cross
